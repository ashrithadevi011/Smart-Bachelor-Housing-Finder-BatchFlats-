{% extends "base.html" %}

{% block title %}Login - BatchFlats{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{{ url_for('register') }}"
                style="color: var(--primary-blue); font-weight: 500;">Sign up here</a>
        </p>
    </form>
</div>
{% endblock %}
