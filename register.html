{% extends "base.html" %}

{% block title %}Sign Up - BatchFlats{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Create Your Account</h2>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" class="form-control" required placeholder="+91 9876543210">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>I am a...</label>
            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                <label style="font-weight: normal;">
                    <input type="radio" name="role" value="Tenant" checked> Tenant (Looking for house/roommate)
                </label>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                <label style="font-weight: normal;">
                    <input type="radio" name="role" value="Owner"> Property Owner (Listing house)
                </label>
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Already have an account? <a href="{{ url_for('login') }}"
                style="color: var(--primary-blue); font-weight: 500;">Login here</a>
        </p>
    </form>
</div>
{% endblock %}
